schema: conduction

context: |
  Project: NL Design
  Repo: ConductionNL/nldesign
  Type: Nextcloud App (PHP backend + vanilla JS admin)
  Description: Dutch government theming for Nextcloud — 39 token sets, 7-layer CSS, theming sync
  Key components: Token Sets, CSS Architecture, Theming Sync, Admin Settings
  Database: None (uses Nextcloud IConfig key-value)
  Mount path: /var/www/html/custom_apps/nldesign

  Architecture:
    Pattern: CSS injection — reads config on boot, loads CSS files via \OCP\Util::addStyle()
    Admin UI: Vanilla PHP template + vanilla JS (no Vue/webpack)
    Token source: NL Design System themes repo (upstream sync via generate-tokens.mjs)
    Font: Fira Sans (open-source, SIL OFL 1.1 licensed)
    No own database tables — all settings via IConfig

  7-Layer CSS Architecture:
    1. css/fonts.css — Fira Sans @font-face
    2. css/defaults.css — All --nldesign-* tokens with Rijkshuisstijl defaults
    3. css/tokens/{org}.css — Organization-specific overrides
    4. css/utrecht-bridge.css — --utrecht-* → --nldesign-component-* mapping
    5. css/theme.css — --nldesign-* → Nextcloud element selectors
    6. css/overrides.css — Nextcloud --color-* vars → --nldesign-*
    7. css/element-overrides.css — Low-level element styling

  Configuration (IConfig):
    nldesign:token_set — Active token set (default: rijkshuisstijl)
    nldesign:hide_slogan — Hide login page slogan (0/1)
    nldesign:show_menu_labels — Show text labels in app menu (0/1)

  Shared specs: See ../openspec/specs/ for cross-project conventions
  Project guidelines: See ../project.md for workspace-wide standards

rules:
  proposal:
    - Reference shared nextcloud-app spec for app structure requirements
    - Consider impact on all Conduction apps (all apps must work with nldesign)
    - New token sets only need a CSS file + manifest entry (no PHP changes)
    - Test with incomplete token sets (must fall back to defaults)
  specs:
    - Specify CSS variable names and fallback behavior
    - Specify load order requirements (layer ordering is critical)
    - Include WCAG AA contrast requirements for all color tokens
    - Use GIVEN/WHEN/THEN scenarios for all requirements
  design:
    - CSS-only theming — no JavaScript for runtime styling
    - All tokens use --nldesign-* prefix
    - Incomplete token sets inherit defaults layer
    - Utrecht bridge is temporary (pending upstream alignment)
  tasks:
    - Test with multiple token sets (especially incomplete ones)
    - Test Nextcloud theming sync (colors, logo)
    - Test dark mode compatibility
    - Verify WCAG AA contrast ratios
